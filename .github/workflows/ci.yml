name: CI/CD Pipeline

on:
  push:
    branches: [ main, dev, uat ]
  pull_request:
    branches: [ main, dev, uat ]

jobs:
  test:
    name: Tests & Static Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: List files (debug)
        run: ls -la

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: xdebug

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction

      - name: Copy CI environment
        run: |
          if [ -f .env.ci ]; then
            cp .env.ci .env
          else
            echo "APP_KEY=base64:12345678901234567890123456789012=" > .env
            echo "DB_CONNECTION=sqlite" >> .env
            echo "DB_DATABASE=:memory:" >> .env
          fi

      - name: Generate app key
        run: php artisan key:generate --force

      - name: Run migrations
        run: php artisan migrate --force

      - name: Run tests with coverage
        run: php artisan test --coverage --min=50

      - name: Run Larastan (PHPStan)
        run: |
          if [ -f vendor/bin/phpstan ]; then
            vendor/bin/phpstan analyse --error-format=github
          else
            echo "PHPStan not installed, skipping"
          fi

      - name: Run Laravel Pint (Linter)
        run: |
          if [ -f vendor/bin/pint ]; then
            vendor/bin/pint --test
          else
            echo "Pint not installed, skipping"
          fi

  deploy-simulate:
    name: Simulate Deployment
    runs-on: ubuntu-latest
    needs: test
    if: success()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup environment
        run: |
          if [ "${{ github.ref_name }}" == "dev" ]; then
            if [ -f .env.dev ]; then
              cp .env.dev .env
              echo "Deploying to DEVELOPMENT with .env.dev"
            else
              echo "Deploying to DEVELOPMENT (no .env.dev)"
            fi
          elif [ "${{ github.ref_name }}" == "uat" ]; then
            if [ -f .env.uat ]; then
              cp .env.uat .env
              echo "Deploying to UAT with .env.uat"
            else
              echo "Deploying to UAT (no .env.uat)"
            fi
          elif [ "${{ github.ref_name }}" == "main" ]; then
            if [ -f .env.prod ]; then
              cp .env.prod .env
              echo "Deploying to PRODUCTION with .env.prod"
            else
              echo "Deploying to PRODUCTION (no .env.prod)"
            fi
          else
            echo "Unknown branch: ${{ github.ref_name }}"
          fi

      - name: Show environment
        run: |
          if [ -f .env ]; then
            echo "APP_ENV: $(grep APP_ENV .env | cut -d '=' -f2)"
            echo "DB_CONNECTION: $(grep DB_CONNECTION .env | cut -d '=' -f2)"
          else
            echo "No .env file found"
          fi

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-simulate
    if: github.ref_name == 'main'
    environment:
      name: production
      url: https://craftclub.ru

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy
        run: echo "🚀 Deploying to PRODUCTION..."

      - name: Notify maintainers
        uses: actions/github-script@v7
        with:
          script: |
            const issueBody = `## 🚀 Pipeline успешно выполнен!
            
            **Ветка:** ${{ github.ref_name }}
            **Статус:** ✅ Успешно
            **Коммит:** ${{ github.sha }}
            
            ### Результаты:
            - Тесты: ✅ Пройдены
            - Статический анализ: ✅ Пройден
            - Линтинг: ✅ Пройден
            - Симуляция деплоя: ✅ Завершена
            
            Автор: ${{ github.actor }}
            Время: ${new Date().toLocaleString()}`;
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Pipeline Success: ${context.sha}`,
              body: issueBody,
              labels: ['pipeline', 'success']
            });
