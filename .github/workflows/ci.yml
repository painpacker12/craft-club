name: CI/CD Pipeline

on:
  push:
    branches: [ dev, uat, main ]
  pull_request:
    branches: [ dev, uat, main ]

jobs:
  test:
    name: Tests & Static Analysis
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-versions: ['8.2']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-versions }}
          extensions: mbstring, dom, fileinfo, mysql, xml, json, pdo_sqlite
          coverage: xdebug
      
      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
      
      - name: Cache Composer dependencies
        uses: actions/cache@v3
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-
      
      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction
      
      - name: Copy CI environment file
        run: cp .env.ci .env
      
      - name: Generate app key
        run: php artisan key:generate
      
      - name: Run tests with coverage
        run: php artisan test --coverage --min=50
      
      - name: Run Larastan (PHPStan)
        run: ./vendor/bin/phpstan analyse --error-format=github
      
      - name: Run Laravel Pint (Linter)
        run: ./vendor/bin/pint --test

  deploy-simulate:
    name: Simulate Deployment
    runs-on: ubuntu-latest
    needs: test
    if: success()
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Environment
        run: |
          if [ "${{ github.ref_name }}" == "dev" ]; then
            cp .env.dev .env
            echo "Deploying to DEVELOPMENT with .env.dev"
          elif [ "${{ github.ref_name }}" == "uat" ]; then
            cp .env.uat .env
            echo "Deploying to UAT with .env.uat"
          elif [ "${{ github.ref_name }}" == "main" ]; then
            cp .env.prod .env
            echo "Deploying to PRODUCTION with .env.prod"
          else
            cp .env.ci .env
            echo "Deploying to CI with .env.ci"
          fi
      
      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction
      
      - name: Generate app key
        run: php artisan key:generate
      
      - name: Run migrations (simulation)
        run: php artisan migrate --force --pretend
      
      - name: Show environment info
        run: |
          echo "APP_ENV: $(grep APP_ENV .env | cut -d '=' -f2)"
          echo "DB_CONNECTION: $(grep DB_CONNECTION .env | cut -d '=' -f2)"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-simulate
    if: github.ref_name == 'main'
    environment:
      name: production
      url: https://craftclub.ru
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
      
      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction
      
      - name: Deploy to production
        run: |
          echo "🚀 Deploying to PRODUCTION server..."
          echo "✅ Deployment simulation complete"
      
      - name: Notify maintainers
        uses: actions/github-script@v7
        with:
          script: |
            const issueBody = `## 🚀 Pipeline успешно выполнен!
            
            **Ветка:** ${{ github.ref_name }}
            **Статус:** ✅ Успешно
            **Коммит:** ${{ github.sha }}
            
            ### Результаты:
            - Тесты: ✅ Пройдены
            - Статический анализ: ✅ Пройден
            - Линтинг: ✅ Пройден
            - Симуляция деплоя: ✅ Завершена
            
            Автор: ${{ github.actor }}
            Время: ${new Date().toLocaleString()}`;
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Pipeline Success: ${context.sha}`,
              body: issueBody,
              labels: ['pipeline', 'success']
            });
